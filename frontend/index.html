<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSL — Legal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --border: #252528;
      --accent: #c9a84c;
      --accent-dim: #7a6330;
      --text: #e8e6e0;
      --muted: #6b6963;
      --success: #4caf79;
      --danger: #cf6679;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 64px 1fr;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 1rem;
    }

    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    header .divider { width: 1px; height: 24px; background: var(--border); }

    header .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    header .status {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    header .status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Sidebar */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      overflow-y: auto;
    }

    aside h3 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
    }

    .doc-item {
      padding: 0.6rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 0.25rem;
      border: 1px solid transparent;
    }

    .doc-item:hover { background: var(--border); }
    .doc-item.active { background: rgba(201,168,76,0.08); border-color: var(--accent-dim); }

    .doc-item .doc-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-item .doc-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Upload zone */
    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.5rem;
    }

    .upload-zone:hover, .upload-zone.drag { 
      border-color: var(--accent);
      background: rgba(201,168,76,0.04);
    }

    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .upload-zone p { font-size: 0.75rem; color: var(--muted); }

    /* Main content */
    main {
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
    }

    .empty-state .big { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--border); }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .card-header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h4 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .card-body { padding: 1.25rem; }

    /* Fields grid */
    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.75rem;
    }

    .field {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
    }

    .field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .field-value { font-size: 0.8rem; color: var(--text); }

    /* Draft area */
    .draft-content {
      font-size: 0.85rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--text);
    }

    .draft-editor {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.85rem;
      line-height: 1.75;
      padding: 1rem;
      resize: vertical;
      min-height: 300px;
    }

    .draft-editor:focus { outline: none; border-color: var(--accent-dim); }

    /* Rules list */
    .rule-item {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
    }

    .rule-item:last-child { border-bottom: none; }
    .rule-item::before { content: '▸'; color: var(--accent); flex-shrink: 0; }

    /* Buttons */
    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }

    .btn-primary { background: var(--accent); color: #0d0d0f; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-success { background: var(--success); color: #0d0d0f; }

    /* Evidence chunks */
    .chunk {
      background: var(--bg);
      border-left: 2px solid var(--accent-dim);
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 0 4px 4px 0;
      font-size: 0.78rem;
      line-height: 1.6;
    }

    .chunk-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }

    /* Loading */
    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
    }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
      font-size: 0.8rem;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 999;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    .tag {
      display: inline-block;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      margin: 0.15rem;
    }

    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .section-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .tab-btn {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Raw text viewer */
    .raw-text-viewer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.6;
      color: var(--muted);
      max-height: 600px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Pearson Specter Litt</span>
  <div class="divider"></div>
  <span class="subtitle">Legal AI — Document Intelligence</span>
  <span class="status" id="statusBadge">API Connected</span>
</header>

<aside>
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.png,.jpg,.jpeg" />
    <div class="icon">⬆</div>
    <p>Drop document or click to upload</p>
  </div>

  <h3>Documents</h3>
  <div id="docList"></div>
</aside>

<main id="mainContent">
  <div class="empty-state">
    <div class="big">§</div>
    <p>Upload a legal document to begin</p>
  </div>
</main>

<div id="toast"></div>

<script>
const API = '/api';
let currentDoc = null;
let currentDraft = null;
let editMode = false;

// ── Utils ──────────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}

function escapeHtml(text) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

function switchTab(tabName) {
  // Hide all tabs
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  
  // Show selected tab
  const tabEl = document.getElementById(tabName + 'Tab');
  const btnEl = event.target;
  if (tabEl) tabEl.classList.add('active');
  if (btnEl) btnEl.classList.add('active');
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.json();
}

// ── Document list ──────────────────────────────────────────────────────────

async function loadDocList() {
  try {
    const data = await apiFetch('/documents');
    const list = document.getElementById('docList');
    list.innerHTML = '';
    if (!data.documents.length) {
      list.innerHTML = '<p style="font-size:0.75rem;color:var(--muted);padding:0.5rem">No documents yet</p>';
      return;
    }
    data.documents.forEach(doc => {
      const el = document.createElement('div');
      el.className = 'doc-item' + (currentDoc?.document_id === doc.id ? ' active' : '');
      el.innerHTML = `
        <div class="doc-name">${doc.filename}</div>
        <div class="doc-meta">${new Date(doc.created_at).toLocaleDateString()}</div>
      `;
      el.onclick = () => selectDoc(doc.id);
      list.appendChild(el);
    });
  } catch (e) {
    console.error(e);
  }
}

async function selectDoc(docId) {
  try {
    const data = await apiFetch(`/documents/${docId}/extracted`);
    currentDoc = { document_id: docId, ...data };
    currentDraft = null;
    renderDocView();
    loadDocList();
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Upload ─────────────────────────────────────────────────────────────────

document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  await uploadFile(file);
};

const zone = document.getElementById('uploadZone');
zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag'); };
zone.ondragleave = () => zone.classList.remove('drag');
zone.ondrop = async e => {
  e.preventDefault();
  zone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) await uploadFile(file);
};

async function uploadFile(file) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="empty-state"><div class="loading"><div class="spinner"></div> Processing document...</div></div>`;

  const form = new FormData();
  form.append('file', file);

  try {
    const data = await apiFetch('/documents', { method: 'POST', body: form });
    currentDoc = data;
    currentDraft = null;
    toast('Document processed successfully');
    renderDocView();
    loadDocList();
  } catch (e) {
    toast(e.message, 'error');
    main.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">${e.message}</p></div>`;
  }
}

// ── Document view ──────────────────────────────────────────────────────────

function renderDocView() {
  const f = currentDoc.structured_fields || {};
  const parties = (f.parties || []).map(p => `<span class="tag">${p}</span>`).join('');
  const dates = (f.dates || []).map(d => `<span class="tag">${d}</span>`).join('');
  const facts = (f.key_facts || []).map(kf => `<div class="rule-item" style="font-size:0.78rem">${kf}</div>`).join('');
  const rawText = (currentDoc.raw_text || '').substring(0, 50000); // Limit to 50k chars for display

  document.getElementById('mainContent').innerHTML = `
    <div>
      <div class="section-title">${currentDoc.filename}</div>
      <div class="section-sub">Document ID: ${currentDoc.document_id} &nbsp;|&nbsp; ${currentDoc.char_count || '—'} chars extracted</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('fields')">📋 Extracted Fields</button>
      <button class="tab-btn" onclick="switchTab('raw')">📝 Raw Text</button>
    </div>

    <div id="fieldsTab" class="tab-content active">
      <div class="card">
        <div class="card-header"><h4>Extracted Fields</h4></div>
        <div class="card-body">
          <div class="fields-grid">
            <div class="field"><div class="field-label">Case Number</div><div class="field-value">${f.case_number || '—'}</div></div>
            <div class="field"><div class="field-label">Doc Type</div><div class="field-value">${f.document_type || '—'}</div></div>
            <div class="field"><div class="field-label">Jurisdiction</div><div class="field-value">${f.jurisdiction || '—'}</div></div>
          </div>
          ${parties ? `<div style="margin-top:0.75rem"><div class="field-label" style="font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.35rem">Parties</div>${parties}</div>` : ''}
          ${dates ? `<div style="margin-top:0.75rem"><div class="field-label" style="font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.35rem">Dates</div>${dates}</div>` : ''}
          ${facts ? `<div style="margin-top:0.75rem"><div class="field-label" style="font-family:'IBM Plex Mono',monospace;font-size:0.6rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.35rem">Key Facts</div>${facts}</div>` : ''}
        </div>
      </div>
    </div>

    <div id="rawTab" class="tab-content">
      <div class="card">
        <div class="card-header"><h4>Raw Extracted Text (${rawText.length} / ${currentDoc.char_count} chars shown)</h4></div>
        <div class="card-body">
          <div class="raw-text-viewer">${escapeHtml(rawText)}${currentDoc.char_count > 50000 ? '\n\n... (truncated - use API for full text)' : ''}</div>
        </div>
      </div>
    </div>

    <div class="actions" style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="generateDraft()">Generate Draft</button>
    </div>

    <div id="draftSection"></div>
    <div id="rulesSection"></div>
  `;
}

// ── Draft generation ───────────────────────────────────────────────────────

async function generateDraft() {
  document.getElementById('draftSection').innerHTML = `
    <div class="loading"><div class="spinner"></div> Generating grounded draft...</div>
  `;

  try {
    const data = await apiFetch(`/documents/${currentDoc.document_id}/draft`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: 'Summarize the key facts, parties, and obligations in this legal document' })
    });
    currentDraft = data;
    renderDraft();
  } catch (e) {
    toast(e.message, 'error');
    document.getElementById('draftSection').innerHTML = `<p style="color:var(--danger);font-size:0.8rem">${e.message}</p>`;
  }
}

function renderDraft() {
  const d = document.getElementById('draftSection');
  d.innerHTML = `
    <div class="card">
      <div class="card-header">
        <h4>Case Fact Summary — Draft</h4>
        <div class="actions">
          <button class="btn btn-ghost" onclick="viewEvidence()">View Evidence</button>
          <button class="btn btn-ghost" onclick="toggleEdit()" id="editBtn">Edit Draft</button>
        </div>
      </div>
      <div class="card-body">
        <div id="draftOutput" class="draft-content">${currentDraft.content}</div>
        <textarea id="draftEditor" class="draft-editor" style="display:none">${currentDraft.content}</textarea>
      </div>
      <div id="editActions" style="display:none;padding:0 1.25rem 1.25rem;gap:0.5rem" class="actions">
        <button class="btn btn-success" onclick="submitEdit()">Submit Edit</button>
        <button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>
    <div id="evidencePanel"></div>
  `;
}

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('draftOutput').style.display = editMode ? 'none' : 'block';
  document.getElementById('draftEditor').style.display = editMode ? 'block' : 'none';
  document.getElementById('editActions').style.display = editMode ? 'flex' : 'none';
  document.getElementById('editBtn').textContent = editMode ? 'Cancel' : 'Edit Draft';
}

function cancelEdit() { toggleEdit(); }

async function submitEdit() {
  const edited = document.getElementById('draftEditor').value;
  try {
    const result = await apiFetch(`/drafts/${currentDraft.draft_id}/edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ edited_content: edited })
    });

    toast(`Captured ${result.extracted_rules.length} preference rule(s)`);
    currentDraft.content = edited;
    toggleEdit();
    document.getElementById('draftOutput').textContent = edited;
    renderRules(result.extracted_rules);
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function viewEvidence() {
  const panel = document.getElementById('evidencePanel');
  if (panel.innerHTML) { panel.innerHTML = ''; return; }

  try {
    const data = await apiFetch(`/drafts/${currentDraft.draft_id}/evidence`);
    panel.innerHTML = `
      <div class="card">
        <div class="card-header"><h4>Supporting Evidence (${data.evidence_chunks.length} chunks)</h4></div>
        <div class="card-body">
          ${data.evidence_chunks.map((c, i) => `
            <div class="chunk">
              <div class="chunk-meta">CHUNK ${i+1} &nbsp;|&nbsp; Score: ${c.score.toFixed(3)} &nbsp;|&nbsp; Doc: ${c.doc_id.substring(0,8)}…</div>
              ${c.text.substring(0, 400)}${c.text.length > 400 ? '…' : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderRules(newRules) {
  const sec = document.getElementById('rulesSection');
  sec.innerHTML = `
    <div class="card">
      <div class="card-header"><h4>Learned Preference Rules</h4></div>
      <div class="card-body">
        ${newRules.map(r => `<div class="rule-item">${r}</div>`).join('')}
        <p style="font-size:0.72rem;color:var(--muted);margin-top:0.75rem;font-family:'IBM Plex Mono',monospace">
          These rules will be applied to all future drafts automatically.
        </p>
      </div>
    </div>
  `;
}

// ── Init ───────────────────────────────────────────────────────────────────

fetch('/health').then(r => {
  if (!r.ok) document.getElementById('statusBadge').style.color = 'var(--danger)';
}).catch(() => {
  document.getElementById('statusBadge').style.color = 'var(--danger)';
  document.getElementById('statusBadge').textContent = 'API Offline';
});

loadDocList();
</script>
</body>
</html>
